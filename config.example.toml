[server]
url   = "https://mattermost.example.com"
token = "your-personal-access-token"
team  = "my-team"           # team slug

[ai]
api_key = ""                # or set ANTHROPIC_API_KEY env var
model   = "claude-sonnet-4-6"
enabled = false

[ui]
date_format        = "15:04"  # or "2006-01-02 15:04"
message_limit      = 100
theme              = "auto"   # "auto" | "dark" | "light"
channels_width     = 22
show_mode_indicator = true

[colors]
active_header_bg = "237"      # background of the active panel header; ANSI 256-color or #RRGGBB
active_header_fg = "15"       # foreground of the active panel header

[channels]
# sort = "alphabetical"   # "alphabetical" | "last_message"
# unread_only = false     # when true, hide channels with no unread messages
